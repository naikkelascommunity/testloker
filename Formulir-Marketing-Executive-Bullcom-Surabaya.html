<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Lamaran - ADAKOM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
        
        .input-field { 
            width: 100%; 
            border: 1.5px solid #ddd; 
            padding: 12px; 
            border-radius: 8px; 
            outline: none; 
            transition: 0.3s; 
        }
        .input-field:focus { border-color: #FBBF24; }
        
        .btn-submit:disabled { 
            background-color: #ccc; 
            cursor: not-allowed; 
            box-shadow: none; 
            color: #777;
        }

        .btn-back-link {
            text-decoration: none;
            color: #333;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 15px;
            transition: 0.2s;
            opacity: 0.7;
        }
        .btn-back-link:hover { opacity: 1; color: #000; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-2xl mx-auto">
        <!-- Tombol Kembali di Luar Card (Atas) -->
        <a href="https://adakomnaikkelas.com/karir" class="btn-back-link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Kembali ke Halaman Karier
        </a>

        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <!-- Header Nama Loker -->
            <div class="bg-[#FBBF24] p-8 text-center">
                <p class="text-xs font-semibold uppercase tracking-widest text-black/50 mb-1">Formulir Lamaran Kerja</p>
                <h1 class="text-2xl font-bold text-black uppercase">Marketing Executive</h1>
            </div>

            <form id="uploadForm" class="p-8 space-y-5">
                <!-- Data Loker Otomatis -->
                <input type="hidden" name="loker" value="Marketing Executive">

                <div>
                    <label class="block text-sm font-bold mb-1">Nama Lengkap *</label>
                    <input type="text" name="nama" placeholder="Masukkan nama lengkap" class="input-field" required>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-1">Alamat Email *</label>
                    <input type="email" name="email" placeholder="contoh@email.com" class="input-field" required>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-bold mb-1">Domisili *</label>
                        <input type="text" name="domisili" placeholder="Kota tempat tinggal" class="input-field" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold mb-1">No. HP Aktif (WhatsApp) *</label>
                        <input type="tel" name="nohp" placeholder="0812xxxx" class="input-field" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold mb-2">Referensi Loker *</label>
                    <select name="referensi" class="input-field" required>
                        <option value="">-- Pilih Referensi --</option>
                        <option>LinkedIn</option>
                        <option>Instagram</option>
                        <option>Tiktok</option>
                        <option>Telegram</option>
                        <option>Facebook</option>
                        <option>WhatsApp</option>
                        <option>Teman</option>
                        <option>Lainnya</option>
                    </select>
                </div>

                <div class="pt-4">
                    <div class="bg-gray-50 p-4 rounded-xl border-l-4 border-yellow-400 mb-6">
                        <p class="text-xs text-gray-600 font-medium italic">Pastikan semua dokumen diunggah dalam format yang benar.</p>
                    </div>
                    
                    <div class="space-y-5">
                        <div>
                            <label class="block text-sm font-bold">Upload CV (PDF, Max 2MB) *</label>
                            <input type="file" id="cv_file" accept=".pdf" class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold">Bukti Follow Instagram @adakomnaikkelas *</label>
                            <input type="file" id="ig_file" accept="image/*" class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100" required>
                        </div>

                        <div>
                            <label class="block text-sm font-bold">Bukti Follow Tiktok @adakomnaikkelas *</label>
                            <input type="file" id="tiktok_file" accept="image/*" class="mt-2 block w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-yellow-50 file:text-yellow-700 hover:file:bg-yellow-100" required>
                        </div>
                    </div>
                </div>

                <div class="pt-6">
                    <button type="submit" id="submitBtn" disabled class="btn-submit w-full bg-[#FBBF24] text-black font-bold py-4 rounded-xl shadow-lg transition duration-300">
                        KIRIM LAMARAN SEKARANG
                    </button>
                    <p id="msg" class="text-center text-sm font-bold mt-6 hidden"></p>
                </div>
            </form>
        </div>
    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');
        const scriptURL = 'MASUKKAN_URL_APPS_SCRIPT_ANDA'; // GANTI DENGAN URL DEPLOYMENT ANDA

        // Fungsi Validasi Tombol
        form.addEventListener('input', () => {
            const isValid = form.checkValidity();
            submitBtn.disabled = !isValid;
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerText = "⏳ Sedang Mengunggah Berkas...";

            const formData = new FormData(form);
            
            const toBase64 = file => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });

            const cv = document.getElementById('cv_file').files[0];
            const ig = document.getElementById('ig_file').files[0];
            const tiktok = document.getElementById('tiktok_file').files[0];

            try {
                if(cv) { formData.append('cv_file', await toBase64(cv)); formData.append('cv_file_name', cv.name); formData.append('cv_file_type', cv.type); }
                if(ig) { formData.append('ig_file', await toBase64(ig)); formData.append('ig_file_name', ig.name); formData.append('ig_file_type', ig.type); }
                if(tiktok) { formData.append('tiktok_file', await toBase64(tiktok)); formData.append('tiktok_file_name', tiktok.name); formData.append('tiktok_file_type', tiktok.type); }

                const response = await fetch(scriptURL, { method: 'POST', body: formData });
                const result = await response.json();

                if(result.result === "success") {
                    document.getElementById('msg').innerHTML = "✅ Lamaran Berhasil Terkirim! Mohon tunggu informasi selanjutnya.";
                    document.getElementById('msg').className = "text-center text-sm font-bold mt-6 text-green-600";
                    form.reset();
                    submitBtn.innerText = "KIRIM LAMARAN SEKARANG";
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                console.error(err);
                document.getElementById('msg').innerHTML = "❌ Terjadi Kesalahan. Silakan coba lagi.";
                document.getElementById('msg').className = "text-center text-sm font-bold mt-6 text-red-600";
                submitBtn.disabled = false;
                submitBtn.innerText = "KIRIM LAMARAN SEKARANG";
            }
            document.getElementById('msg').classList.remove('hidden');
        });
    </script>
</body>
</html>
